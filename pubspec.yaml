name: gestorlog
description: "Gestor de Logistica."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  path: ^1.9.0
  http: ^1.2.2
  dio: ^5.7.0
  flutter_dotenv: ^5.2.1
  mobile_scanner: ^5.0.0
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  package_info_plus: ^9.0.1
  brasil_fields: ^1.9.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/fonts/
